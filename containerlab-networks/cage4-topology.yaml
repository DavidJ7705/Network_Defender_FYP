name: cage4-defense-network

topology:
  nodes:
    internet-router:
      kind: linux
      image: alpine:latest
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.0.1/30 dev eth1

    # Restricted Zone A
    restricted-zone-a-router:
      kind: linux
      image: alpine:latest
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.0.2/30 dev eth1
        - ip addr add 10.0.1.1/30 dev eth2
        - ip addr add 10.0.1.5/30 dev eth3
        - ip addr add 10.0.1.9/30 dev eth4
        - ip addr add 10.0.1.13/30 dev eth5
        - ip route replace default via 10.0.0.1

    restricted-zone-a-server-0:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.0.1.6/30 dev eth1
        - ip route replace default via 10.0.1.5

    restricted-zone-a-server-1:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.0.1.10/30 dev eth1
        - ip route replace default via 10.0.1.9

    restricted-zone-a-user-0:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.0.1.14/30 dev eth1
        - ip route replace default via 10.0.1.13

    # Operational Zone A
    operational-zone-a-router:
      kind: linux
      image: alpine:latest
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.1.2/30 dev eth1
        - ip addr add 10.0.2.1/30 dev eth2
        - ip addr add 10.0.2.5/30 dev eth3
        - ip route replace default via 10.0.1.1

    operational-zone-a-server-0:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.0.2.2/30 dev eth1
        - ip route replace default via 10.0.2.1

    operational-zone-a-user-0:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.0.2.6/30 dev eth1
        - ip route replace default via 10.0.2.5

  links:
    - endpoints: ["internet-router:eth1", "restricted-zone-a-router:eth1"]
    - endpoints: ["restricted-zone-a-router:eth2", "operational-zone-a-router:eth1"]
    - endpoints: ["restricted-zone-a-router:eth3", "restricted-zone-a-server-0:eth1"]
    - endpoints: ["restricted-zone-a-router:eth4", "restricted-zone-a-server-1:eth1"]
    - endpoints: ["restricted-zone-a-router:eth5", "restricted-zone-a-user-0:eth1"]
    - endpoints: ["operational-zone-a-router:eth2", "operational-zone-a-server-0:eth1"]
    - endpoints: ["operational-zone-a-router:eth3", "operational-zone-a-user-0:eth1"]